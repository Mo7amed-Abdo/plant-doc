<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Treatment Requests - PlantDoc</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-container": "#eceeef",
                        "surface-variant": "#e1e3e4",
                        "on-background": "#191c1d",
                        "background": "#f8fafb",
                        "primary": "#006a39",
                        "on-tertiary-fixed": "#40000f",
                        "outline-variant": "#bdcabc",
                        "on-error-container": "#93000a",
                        "surface-container-low": "#f2f4f5",
                        "secondary-container": "#c6e4f4",
                        "on-error": "#ffffff",
                        "on-primary-fixed": "#00210e",
                        "surface-container-lowest": "#ffffff",
                        "error": "#ba1a1a",
                        "tertiary-fixed": "#ffdadb",
                        "on-surface-variant": "#3e4a3f",
                        "primary-fixed-dim": "#64dd91",
                        "outline": "#6d7a6f",
                        "inverse-on-surface": "#eff1f2",
                        "secondary-fixed-dim": "#adcbda",
                        "inverse-surface": "#2e3132",
                        "surface-tint": "#006d3a",
                        "tertiary": "#a23546",
                        "on-secondary": "#ffffff",
                        "surface": "#f8fafb",
                        "secondary": "#466270",
                        "primary-fixed": "#82faab",
                        "tertiary-container": "#c24d5e",
                        "surface-dim": "#d8dadb",
                        "surface-container-highest": "#e1e3e4",
                        "on-tertiary-fixed-variant": "#851f33",
                        "on-secondary-container": "#4a6774",
                        "surface-bright": "#f8fafb",
                        "on-secondary-fixed": "#001f2a",
                        "surface-container-high": "#e6e8e9",
                        "error-container": "#ffdad6",
                        "on-primary": "#ffffff",
                        "tertiary-fixed-dim": "#ffb2b8",
                        "on-primary-fixed-variant": "#00522b",
                        "on-surface": "#191c1d",
                        "secondary-fixed": "#c9e7f7",
                        "on-secondary-fixed-variant": "#2e4b57",
                        "on-primary-container": "#f6fff4",
                        "primary-container": "#008649",
                        "on-tertiary-container": "#fffbff",
                        "on-tertiary": "#ffffff",
                        "inverse-primary": "#64dd91"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    fontFamily: {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
    <style>
        #filter-modal {
            transition: opacity 0.2s ease, transform 0.2s ease;
        }
        #filter-modal.hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.97) translateY(-6px);
        }
        #filter-modal:not(.hidden) {
            opacity: 1;
            transform: scale(1) translateY(0);
        }
        .filter-chip input:checked ~ .chip-label {
            background-color: #006a39;
            color: #ffffff;
            border-color: #006a39;
        }
    </style>
</head>

<body class="bg-background text-on-background min-h-screen flex font-body">

    <!-- SideNavBar — matches dashboard exactly -->
    <nav class="bg-slate-50 dark:bg-slate-950 text-green-600 dark:text-green-400 font-inter text-sm font-medium fixed h-screen w-64 left-0 top-0 border-r border-slate-200 dark:border-slate-800 flex flex-col gap-2 hidden md:flex z-50">
        <!-- Logo -->
        <div class="flex items-center gap-1">
            <div class="flex items-center">
                <img src="logo dark.png" alt="" class="w-26 h-28">
            </div>
            <span class="text-lg font-bold text-green-700 dark:text-green-500">PlantDoc</span>
        </div>

        <!-- Nav Links -->
        <div class="flex-1 flex flex-col gap-1 px-4 pt-3">
            <!-- Dashboard -->
            <a class="text-slate-600 dark:text-slate-400 rounded-lg p-3 flex items-center gap-3 hover:bg-slate-200 dark:hover:bg-slate-800 transition-all active:scale-[0.98]"
                href="dashboardcompany.html">
                <span class="material-symbols-outlined">dashboard</span>
                <span>Dashboard</span>
            </a>
            <!-- Treatment Requests (ACTIVE) -->
            <a class="bg-green-700 dark:bg-green-900/30 text-white dark:text-green-300 rounded-xl p-3 flex items-center gap-3 scale-100 active:scale-[0.98] transition-transform"
                href="#">
                <span class="material-symbols-outlined fill">medical_services</span>
                <span>Treatment Requests</span>
            </a>
            <!-- Products -->
            <a class="text-slate-600 dark:text-slate-400 rounded-lg p-3 flex items-center gap-3 hover:bg-slate-200 dark:hover:bg-slate-800 transition-all active:scale-[0.98]"
                href="products.html">
                <span class="material-symbols-outlined">inventory_2</span>
                <span>Products</span>
            </a>
            <!-- Orders -->
            <a class="text-slate-600 dark:text-slate-400 rounded-lg p-3 flex items-center gap-3 hover:bg-slate-200 dark:hover:bg-slate-800 transition-all active:scale-[0.98]"
                href="orders.html">
                <span class="material-symbols-outlined">shopping_basket</span>
                <span>Orders</span>
            </a>
        </div>

        <!-- Bottom section — settings + profile -->
        <div class="px-4 pb-2 flex flex-col gap-1">
            <a class="text-slate-600 dark:text-slate-400 rounded-lg p-3 flex items-center gap-3 hover:bg-slate-200 dark:hover:bg-slate-800 transition-all active:scale-[0.98]"
                href="#">
                <span class="material-symbols-outlined">settings</span>
                <span>Settings</span>
            </a>
            <a class="text-slate-600 dark:text-slate-400 rounded-lg p-3 flex items-center gap-3 hover:bg-slate-200 dark:hover:bg-slate-800 transition-all active:scale-[0.98]"
                href="#">
                <span class="material-symbols-outlined">help</span>
                <span>Help Center</span>
            </a>
        </div>

        <!-- Profile -->
        <div class="mt-auto pt-4 border-t border-slate-200 dark:border-slate-800 px-4 pb-5">
            <div class="flex items-center gap-3 px-2">
                <img src="" alt="Profile" class="w-10 h-10 rounded-full object-cover border border-outline-variant" data-user-avatar />
                <div class="flex flex-col">
                    <span class="font-bold text-on-surface text-sm" data-user-name>Loading...</span>
                    <span class="text-xs text-on-surface-variant" data-user-role>Loading...</span>
                </div>
                <button class="ml-auto text-on-surface-variant hover:text-error transition-colors">
                    <span class="material-symbols-outlined text-lg">logout</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col md:ml-64 w-full">

        <!-- Mobile TopNavBar -->
        <header class="md:hidden sticky top-0 z-40 flex h-16 w-full items-center justify-between px-4 bg-gray-50 border-b border-slate-200 shadow-sm">
            <div class="flex items-center gap-2">
                <span class="material-symbols-outlined fill text-primary text-2xl">spa</span>
                <h1 class="text-xl font-bold text-green-700">PlantDoc</h1>
            </div>
            <div class="flex items-center gap-2">
                <button class="p-2 text-slate-500 hover:text-green-600 transition-colors active:scale-95 rounded-full hover:bg-surface-container-highest relative">
                    <span class="material-symbols-outlined">notifications</span>
                    <span data-notif-dot class="hidden absolute top-1 right-1 w-2 h-2 bg-error rounded-full"></span>
                </button>
                <button class="p-2 text-slate-500 hover:text-green-600 transition-colors active:scale-95 rounded-full hover:bg-surface-container-highest">
                    <span class="material-symbols-outlined">account_circle</span>
                </button>
            </div>
        </header>

        <!-- Page Content -->
        <div class="p-6 md:p-8 flex-1 overflow-y-auto">

            <!-- Page heading + CTA -->
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8">
                <div>
                    <h2 class="text-2xl font-bold text-on-surface">Treatment Requests</h2>
                    <p class="text-on-surface-variant text-sm mt-1">Review and manage incoming agricultural disease reports.</p>
                </div>
                <div class="flex gap-3">
                    <button data-filter class="flex items-center gap-2 px-4 py-2 bg-surface-container-lowest border border-outline-variant rounded-lg text-sm font-medium text-on-surface hover:bg-surface-container transition-colors shadow-sm active:scale-[0.98]">
                        <span class="material-symbols-outlined text-[18px]">filter_list</span>
                        Filter
                    </button>
                    <button class="flex items-center gap-2 px-4 py-2 bg-primary text-on-primary rounded-lg text-sm font-semibold hover:bg-surface-tint hover:translate-y-[-2px] transition-all duration-200 hover:border-primary border border-primary hover:shadow-lg hover:bg-white hover:text-primary shadow-sm active:scale-[0.98]">
                        <span class="material-symbols-outlined text-[18px]">add</span>
                        New Request
                    </button>
                </div>
            </div>

            <!-- Request Cards Grid -->
            <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4 p-2 border-t-2 border-primary rounded-xl" data-request-grid>
        </div>
    </main>

    <!-- Filter Modal -->
    <div id="filter-modal" class="hidden fixed z-50 bg-surface-container-lowest rounded-[16px] shadow-xl border border-surface-variant w-80 p-5 flex flex-col gap-5"
         style="top: 0; left: 0;">

        <!-- Header -->
        <div class="flex items-center justify-between">
            <h3 class="font-semibold text-on-surface font-headline flex items-center gap-2">
                <span class="material-symbols-outlined text-[20px] text-primary">tune</span>
                Filter Requests
            </h3>
            <button id="close-filter" class="p-1 pb-0 rounded-lg text-on-surface-variant hover:bg-surface-container transition-colors active:scale-[0.95]">
                <span class="material-symbols-outlined text-[20px]">close</span>
            </button>
        </div>

        <div class="w-full h-px bg-surface-variant"></div>

        <!-- Priority -->
        <div class="flex flex-col gap-3">
            <p class="text-xs font-semibold text-on-surface-variant uppercase tracking-wider">Priority</p>
            <div class="flex flex-wrap gap-2">
                <label class="filter-chip cursor-pointer">
                    <input type="checkbox" class="sr-only" />
                    <span class="chip-label inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-sm font-medium border border-outline-variant bg-surface-container-lowest text-on-surface hover:bg-surface-container transition-colors select-none">
                        <span class="w-1.5 h-1.5 rounded-full bg-error inline-block"></span> High
                    </span>
                </label>
                <label class="filter-chip cursor-pointer">
                    <input type="checkbox" class="sr-only" />
                    <span class="chip-label inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-sm font-medium border border-outline-variant bg-surface-container-lowest text-on-surface hover:bg-surface-container transition-colors select-none">
                        <span class="w-1.5 h-1.5 rounded-full bg-outline inline-block"></span> Low
                    </span>
                </label>
            </div>
        </div>

        <div class="w-full h-px bg-surface-variant"></div>

        <!-- Status -->
        <div class="flex flex-col gap-3">
            <p class="text-xs font-semibold text-on-surface-variant uppercase tracking-wider">Status</p>
            <div class="flex flex-wrap gap-2">
                <label class="filter-chip cursor-pointer">
                    <input type="checkbox" class="sr-only" />
                    <span class="chip-label inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-sm font-medium border border-outline-variant bg-surface-container-lowest text-on-surface hover:bg-surface-container transition-colors select-none">
                        <span class="w-1.5 h-1.5 rounded-full bg-primary inline-block"></span> Approved
                    </span>
                </label>
                <label class="filter-chip cursor-pointer">
                    <input type="checkbox" class="sr-only" />
                    <span class="chip-label inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-sm font-medium border border-outline-variant bg-surface-container-lowest text-on-surface hover:bg-surface-container transition-colors select-none">
                        <span class="w-1.5 h-1.5 rounded-full bg-error inline-block"></span> Rejected
                    </span>
                </label>
                <label class="filter-chip cursor-pointer">
                    <input type="checkbox" class="sr-only" />
                    <span class="chip-label inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-sm font-medium border border-outline-variant bg-surface-container-lowest text-on-surface hover:bg-surface-container transition-colors select-none">
                        <span class="w-1.5 h-1.5 rounded-full bg-tertiary inline-block"></span> Pending Review
                    </span>
                </label>
            </div>
        </div>

        <div class="w-full h-px bg-surface-variant"></div>

        <!-- Actions -->
        <div class="flex items-center gap-3">
            <button id="clear-filters" class="flex-1 py-2 border border-outline-variant rounded-lg text-sm font-medium text-on-surface hover:bg-surface-container transition-colors active:scale-[0.98]">
                Clear All
            </button>
            <button id="apply-filters" class="flex-1 py-2 bg-primary text-on-primary rounded-lg text-sm font-semibold hover:translate-y-[-1px] hover:shadow-md transition-all duration-200 active:scale-[0.98]">
                Apply Filters
            </button>
        </div>
    </div>

    <script>
        const filterBtn = document.querySelector('button[data-filter]');
        const modal = document.getElementById('filter-modal');
        const closeBtn = document.getElementById('close-filter');
        const clearBtn = document.getElementById('clear-filters');
        const applyBtn = document.getElementById('apply-filters');

        function positionModal() {
            const btnRect = filterBtn.getBoundingClientRect();
            const modalWidth = 320;
            let left = btnRect.left;
            let top = btnRect.bottom + 8;
            if (left + modalWidth > window.innerWidth - 16) {
                left = btnRect.right - modalWidth;
            }
            modal.style.top = top + 'px';
            modal.style.left = left + 'px';
        }

        filterBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            positionModal();
            modal.classList.toggle('hidden');
        });

        closeBtn.addEventListener('click', () => modal.classList.add('hidden'));

        document.addEventListener('click', (e) => {
            if (!modal.contains(e.target) && e.target !== filterBtn) {
                modal.classList.add('hidden');
            }
        });

        clearBtn.addEventListener('click', () => {
            modal.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
        });

        applyBtn.addEventListener('click', () => modal.classList.add('hidden'));
    </script>


    <script src="../api.js"></script>
    <script src="./companytreatmentrequests.js"></script>
</body>

</html>
