<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Orders - PlantDoc</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-container": "#eceeef",
                        "surface-variant": "#e1e3e4",
                        "on-background": "#191c1d",
                        "background": "#f8fafb",
                        "primary": "#006a39",
                        "on-tertiary-fixed": "#40000f",
                        "outline-variant": "#bdcabc",
                        "on-error-container": "#93000a",
                        "surface-container-low": "#f2f4f5",
                        "secondary-container": "#c6e4f4",
                        "on-error": "#ffffff",
                        "on-primary-fixed": "#00210e",
                        "surface-container-lowest": "#ffffff",
                        "error": "#ba1a1a",
                        "tertiary-fixed": "#ffdadb",
                        "on-surface-variant": "#3e4a3f",
                        "primary-fixed-dim": "#64dd91",
                        "outline": "#6d7a6f",
                        "inverse-on-surface": "#eff1f2",
                        "secondary-fixed-dim": "#adcbda",
                        "inverse-surface": "#2e3132",
                        "surface-tint": "#006d3a",
                        "tertiary": "#a23546",
                        "on-secondary": "#ffffff",
                        "surface": "#f8fafb",
                        "secondary": "#466270",
                        "primary-fixed": "#82faab",
                        "tertiary-container": "#c24d5e",
                        "surface-dim": "#d8dadb",
                        "surface-container-highest": "#e1e3e4",
                        "on-tertiary-fixed-variant": "#851f33",
                        "on-secondary-container": "#4a6774",
                        "surface-bright": "#f8fafb",
                        "on-secondary-fixed": "#001f2a",
                        "surface-container-high": "#e6e8e9",
                        "error-container": "#ffdad6",
                        "on-primary": "#ffffff",
                        "tertiary-fixed-dim": "#ffb2b8",
                        "on-primary-fixed-variant": "#00522b",
                        "on-surface": "#191c1d",
                        "secondary-fixed": "#c9e7f7",
                        "on-secondary-fixed-variant": "#2e4b57",
                        "on-primary-container": "#f6fff4",
                        "primary-container": "#008649",
                        "on-tertiary-container": "#fffbff",
                        "on-tertiary": "#ffffff",
                        "inverse-primary": "#64dd91"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    fontFamily: {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        /* Filter modal */
        #filter-modal {
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        #filter-modal.hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.97) translateY(-6px);
        }

        #filter-modal:not(.hidden) {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        .filter-chip input:checked~.chip-label {
            background-color: #006a39;
            color: #ffffff;
            border-color: #006a39;
        }

        /* Order details modal */
        #order-modal-backdrop {
            transition: opacity 0.25s ease;
        }

        #order-modal-backdrop.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #order-modal-backdrop:not(.hidden) {
            opacity: 1;
        }

        #order-modal {
            transition: opacity 0.25s ease, transform 0.25s ease;
        }

        #order-modal-backdrop.hidden #order-modal {
            opacity: 0;
            transform: scale(0.96) translateY(12px);
        }

        #order-modal-backdrop:not(.hidden) #order-modal {
            opacity: 1;
            transform: scale(1) translateY(0);
        }
    </style>
</head>

<body class="bg-background text-on-background min-h-screen flex font-body">

    <!-- SideNavBar -->
    <nav
        class="bg-slate-50 text-green-600 font-inter text-sm font-medium fixed h-screen w-64 left-0 top-0 border-r border-slate-200 flex flex-col gap-2 hidden md:flex z-50">
        <div class="flex items-center gap-1">
            <div class="flex items-center">
                <img src="logo dark.png" alt="" class="w-26 h-28">
            </div>
            <span class="text-lg font-bold text-green-700">PlantDoc</span>
        </div>
        <div class="flex-1 flex flex-col gap-1 px-4 pt-3">
            <a class="text-slate-600 rounded-lg p-3 flex items-center gap-3 hover:bg-slate-200 transition-all active:scale-[0.98]"
                href="dashboardcompany.html">
                <span class="material-symbols-outlined">dashboard</span><span>Dashboard</span>
            </a>
            <a class="text-slate-600 rounded-lg p-3 flex items-center gap-3 hover:bg-slate-200 transition-all active:scale-[0.98]"
                href="treatmentrequest.html">
                <span class="material-symbols-outlined">medical_services</span><span>Treatment Requests</span>
            </a>
            <a class="text-slate-600 rounded-lg p-3 flex items-center gap-3 hover:bg-slate-200 transition-all active:scale-[0.98]"
                href="products.html">
                <span class="material-symbols-outlined">inventory_2</span><span>Products</span>
            </a>
            <!-- Orders (ACTIVE) -->
            <a class="bg-green-700 text-white rounded-xl p-3 flex items-center gap-3 active:scale-[0.98] transition-transform"
                href="#">
                <span class="material-symbols-outlined fill">shopping_basket</span><span>Orders</span>
            </a>
        </div>
        <div class="px-4 pb-2 flex flex-col gap-1">
            <a class="text-slate-600 rounded-lg p-3 flex items-center gap-3 hover:bg-slate-200 transition-all active:scale-[0.98]"
                href="#">
                <span class="material-symbols-outlined">settings</span><span>Settings</span>
            </a>
            <a class="text-slate-600 rounded-lg p-3 flex items-center gap-3 hover:bg-slate-200 transition-all active:scale-[0.98]"
                href="#">
                <span class="material-symbols-outlined">help</span><span>Help Center</span>
            </a>
        </div>
        <div class="mt-auto pt-4 border-t border-slate-200 px-4 pb-5">
            <div class="flex items-center gap-3 px-2">
                <img src="" alt="Profile" class="w-10 h-10 rounded-full object-cover border border-outline-variant"
                    data-user-avatar />
                <div class="flex flex-col">
                    <span class="font-bold text-on-surface text-sm" data-user-name>Loading...</span>
                    <span class="text-xs text-on-surface-variant" data-user-role>Loading...</span>
                </div>
                <button class="ml-auto text-on-surface-variant hover:text-error transition-colors">
                    <span class="material-symbols-outlined text-lg">logout</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col md:ml-64 w-full">

        <!-- Mobile Header -->
        <header
            class="md:hidden sticky top-0 z-40 flex h-16 w-full items-center justify-between px-4 bg-gray-50 border-b border-slate-200 shadow-sm">
            <div class="flex items-center gap-2">
                <span class="material-symbols-outlined fill text-primary text-2xl">spa</span>
                <h1 class="text-xl font-bold text-green-700">PlantDoc</h1>
            </div>
            <div class="flex items-center gap-2">
                <button
                    class="p-2 text-slate-500 hover:text-green-600 transition-colors active:scale-95 rounded-full hover:bg-surface-container-highest">
                    <span class="material-symbols-outlined">notifications</span>
                </button>
                <button
                    class="p-2 text-slate-500 hover:text-green-600 transition-colors active:scale-95 rounded-full hover:bg-surface-container-highest">
                    <span class="material-symbols-outlined">account_circle</span>
                </button>
            </div>
        </header>

        <div class="p-6 md:p-8 flex-1 overflow-y-auto">

            <!-- Page heading row -->
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8">
                <div class="shrink-0">
                    <h2 class="text-2xl font-bold text-on-surface">Orders Management</h2>
                </div>

                <!-- Center: search -->
                <div class="flex-1 relative group hidden md:block">
                    <span
                        class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px] pointer-events-none group-focus-within:text-primary transition-colors duration-200">search</span>
                    <input type="text" placeholder="Search by Order ID or Farmer..."
                        class="w-full bg-surface-container-low border border-surface-variant text-on-surface rounded-full pl-11 pr-5 py-2.5 text-sm font-medium placeholder:text-on-surface-variant/50 focus:ring-1 focus:ring-primary hover:border-primary focus:border-primary transition-colors duration-200" />
                </div>

                <!-- Right: notification + filter + new order -->
                <div class="flex items-center gap-3 shrink-0">
                    <button
                        class="relative p-2 pb-0 text-on-surface-variant hover:text-primary hover:bg-surface-container rounded-full transition-all duration-200 active:scale-95">
                        <span class="material-symbols-outlined">notifications</span>
                        <span
                            class="absolute top-1.5 right-1.5 w-2 h-2 bg-error rounded-full border-2 border-background"></span>
                    </button>
                    <button data-filter
                        class="flex items-center gap-2 px-4 py-2 bg-surface-container-lowest border border-outline-variant rounded-lg text-sm font-medium text-on-surface hover:bg-surface-container transition-colors shadow-sm active:scale-[0.98]">
                        <span class="material-symbols-outlined text-[18px]">filter_list</span>
                        Filter
                    </button>
                    <button
                        class="flex items-center gap-2 px-4 py-2 bg-primary text-on-primary rounded-lg text-sm font-semibold hover:translate-y-[-2px] transition-all duration-200 border border-primary hover:shadow-lg hover:bg-white hover:text-primary shadow-sm active:scale-[0.98]">
                        <span class="material-symbols-outlined text-[18px]">add</span>
                        New Order
                    </button>
                </div>
            </div>

            <!-- Orders Table -->
            <div class="pt-2 border-t-2 border-primary rounded-xl">
                <div
                    class="bg-surface-container-lowest rounded-[16px] shadow-sm border border-surface-variant overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm text-on-surface whitespace-nowrap">
                            <thead
                                class="bg-surface-container-low text-xs uppercase text-on-surface-variant font-semibold border-b border-surface-variant">
                                <tr>
                                    <th class="px-6 py-4 font-medium">Order ID</th>
                                    <th class="px-6 py-4 font-medium">Farmer</th>
                                    <th class="px-6 py-4 font-medium hidden sm:table-cell">Product</th>
                                    <th class="px-6 py-4 font-medium hidden md:table-cell">Qty</th>
                                    <th class="px-6 py-4 font-medium hidden md:table-cell">Total</th>
                                    <th class="px-6 py-4 font-medium hidden lg:table-cell">Date</th>
                                    <th class="px-6 py-4 font-medium">Status</th>
                                    <th class="px-6 py-4 font-medium"></th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-surface-variant">
                                <tr>
                                    <td colspan="8" class="px-6 py-8 text-center text-on-surface-variant text-sm">
                                        Loading...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
    </main>
</body>

<script src="../api.js"></script>
<script src="./companyorders.js"></script>

</html>
