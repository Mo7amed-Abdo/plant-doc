<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notifications - PlantDoc</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />
</head>

<body class="bg-slate-50 text-slate-900 min-h-screen flex" style="font-family: Inter, sans-serif;">
  <nav
    class="bg-slate-50 text-green-700 text-sm font-medium fixed h-screen w-64 left-0 top-0 border-r border-slate-200 flex-col gap-2 hidden md:flex z-50">
    <div class="flex items-center gap-1">
      <div class="flex items-center"><img src="logo dark.png" alt="" class="w-26 h-28" /></div>
      <span class="text-lg font-bold text-green-700">PlantDoc</span>
    </div>
    <div class="flex-1 flex flex-col gap-1 px-4 pt-3">
      <a class="text-slate-600 rounded-lg p-3 flex items-center gap-3 hover:bg-slate-200"
        href="deliverydashboard.html"><span class="material-symbols-outlined">dashboard</span><span>Dashboard</span></a>
      <a class="text-slate-600 rounded-lg p-3 flex items-center gap-3 hover:bg-slate-200"
        href="activedelivery.html"><span class="material-symbols-outlined">local_shipping</span><span>Active
          Orders</span></a>
      <a class="text-slate-600 rounded-lg p-3 flex items-center gap-3 hover:bg-slate-200"
        href="deliveryCompletedorders.html"><span class="material-symbols-outlined">task_alt</span><span>Completed
          Orders</span></a>
      <a class="bg-green-700 text-white rounded-xl p-3 flex items-center gap-3" href="#"><span
          class="material-symbols-outlined">notifications</span><span>Notifications</span></a>
      <a class="text-slate-600 rounded-lg p-3 flex items-center gap-3 hover:bg-slate-200"
        href="deliveryprofile.html"><span class="material-symbols-outlined">person</span><span>Profile</span></a>
    </div>

    <!-- Profile card -->
    <div class="mt-auto pt-4 border-t border-slate-200 px-4 pb-5">
      <a class="rounded-xl px-3 py-2.5 flex items-center gap-3 bg-gradient-to-r from-green-100 to-emerald-50 border border-green-200 hover:from-green-200 hover:to-emerald-100 transition-all active:scale-[0.98] shadow-sm"
        href="deliveryprofile.html">
        <img src="" class="w-9 h-9 rounded-full object-cover border-2 border-white shadow-sm shrink-0" alt="Profile"
          data-user-avatar />
        <div class="flex flex-col min-w-0">
          <span class="font-bold text-green-900 text-sm truncate" data-user-name>Loading...</span>
          <span class="text-xs text-green-700 truncate" data-user-role>Loading...</span>
        </div>
        <button class="ml-auto text-green-700 hover:text-green-900 transition-colors">
          <span class="material-symbols-outlined text-lg">logout</span>
        </button>
      </a>
    </div>
  </nav>

  <main class="flex-1 md:ml-64 w-full p-6 md:p-8">
    <div class="flex items-center justify-between mb-6">
      <h1 class="text-2xl font-bold">
        <span class="inline-flex items-center gap-2 px-4 py-2 rounded-full border border-green-200/80 bg-gradient-to-r from-green-50 via-emerald-50 to-green-100 shadow-sm text-green-700">
          <span class="material-symbols-outlined text-[18px]">notifications</span>
          <span>Notifications</span>
        </span>
      </h1>
      <button id="mark-all-btn"
        class="group inline-flex items-center gap-2 px-4 py-2 rounded-full border border-green-200/80 bg-gradient-to-r from-green-50 via-emerald-50 to-green-100 shadow-sm text-green-700 text-sm font-bold hover:shadow-md hover:from-green-100 hover:to-emerald-100 transition-all active:scale-[0.98]">
        <span class="inline-flex items-center justify-center w-8 h-8 rounded-full bg-white/80 border border-green-200/70 shadow-sm group-hover:border-green-300/80 transition-colors">
          <span class="material-symbols-outlined text-[18px]">done_all</span>
        </span>
        <span>Mark all as read</span>
      </button>
    </div>

    <div class="mb-3 text-xs font-semibold uppercase tracking-wider text-slate-500 flex items-center gap-2">
      <span>Unread</span>
      <span id="unread-count"
        class="inline-flex items-center justify-center min-w-5 h-5 px-1 rounded-full bg-green-700 text-white text-[10px] hidden">0</span>
    </div>
    <section class="border-t-2 border-green-700 rounded-xl pt-3 mb-8" data-unread-list></section>

    <div class="mb-3 text-xs font-semibold uppercase tracking-wider text-slate-500">Earlier</div>
    <section class="border-t-2 border-green-700 rounded-xl pt-3" data-read-list></section>
  </main>

  <script src="../api.js"></script>
  <script src="./deliverynotifications.js"></script>
</body>

</html>
