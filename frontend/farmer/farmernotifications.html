<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Notifications - PlantDoc</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config={darkMode:"class",theme:{extend:{colors:{"surface-container":"#eceeef","surface-variant":"#e1e3e4","on-background":"#191c1d","background":"#f8fafb","primary":"#006a39","on-tertiary-fixed":"#40000f","outline-variant":"#bdcabc","on-error-container":"#93000a","surface-container-low":"#f2f4f5","secondary-container":"#c6e4f4","on-error":"#ffffff","on-primary-fixed":"#00210e","surface-container-lowest":"#ffffff","error":"#ba1a1a","tertiary-fixed":"#ffdadb","on-surface-variant":"#3e4a3f","primary-fixed-dim":"#64dd91","outline":"#6d7a6f","inverse-on-surface":"#eff1f2","secondary-fixed-dim":"#adcbda","inverse-surface":"#2e3132","surface-tint":"#006d3a","tertiary":"#a23546","on-secondary":"#ffffff","surface":"#f8fafb","secondary":"#466270","primary-fixed":"#82faab","tertiary-container":"#c24d5e","surface-dim":"#d8dadb","surface-container-highest":"#e1e3e4","on-tertiary-fixed-variant":"#851f33","on-secondary-container":"#4a6774","surface-bright":"#f8fafb","on-secondary-fixed":"#001f2a","surface-container-high":"#e6e8e9","error-container":"#ffdad6","on-primary":"#ffffff","tertiary-fixed-dim":"#ffb2b8","on-primary-fixed-variant":"#00522b","on-surface":"#191c1d","secondary-fixed":"#c9e7f7","on-secondary-fixed-variant":"#2e4b57","on-primary-container":"#f6fff4","primary-container":"#008649","on-tertiary-container":"#fffbff","on-tertiary":"#ffffff","inverse-primary":"#64dd91"},borderRadius:{"DEFAULT":"0.25rem","lg":"0.5rem","xl":"0.75rem","full":"9999px"},fontFamily:{"headline":["Inter"],"body":["Inter"],"label":["Inter"]}}}}
    </script>
    <style>
        body{font-family:'Inter',sans-serif;}
        .material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;}
        .material-symbols-outlined.fill{font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24;}
        .notif-item{transition:background-color 0.3s ease,border-color 0.3s ease;}
        .notif-item .unread-bar,.notif-item .unread-dot{transition:opacity 0.3s ease,transform 0.3s ease,width 0.3s ease;}
        .notif-item.is-read .unread-bar{opacity:0;width:0;}
        .notif-item.is-read .unread-dot{opacity:0;transform:scale(0);}
        .notif-item.is-read .notif-icon-wrap{opacity:0.6;}
        .notif-item.is-read .notif-content{opacity:0.75;}
        .notif-icon-wrap,.notif-content{transition:opacity 0.3s ease;}
        /* Filter tabs */
        .filter-tab.active{background-color:#008649;color:#f6fff4;}
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex font-body">

    <!-- SideNavBar -->
    <nav class="bg-slate-50 text-sm font-medium fixed h-screen w-64 left-0 top-0 border-r border-slate-200 flex-col gap-2 hidden md:flex z-50">
        <div class="px-6 pt-6 pb-1"><span class="text-2xl font-black text-green-700">PlantDoc</span></div>
        <p class="text-xs text-slate-500 px-6 mb-4">Modern Farmer Portal</p>
        <div class="flex-1 flex flex-col gap-1 px-4">
            <a class="text-slate-600 rounded-xl px-4 py-3 flex items-center gap-3 hover:bg-slate-100 hover:text-green-700 transition-all active:scale-[0.98]" href="farmerdashboard.html"><span class="material-symbols-outlined">dashboard</span><span>Dashboard</span></a>
            <a class="text-slate-600 rounded-xl px-4 py-3 flex items-center gap-3 hover:bg-slate-100 hover:text-green-700 transition-all active:scale-[0.98]" href="recendiagnoses.html"><span class="material-symbols-outlined">biotech</span><span>Diagnoses</span></a>
            <a class="text-slate-600 rounded-xl px-4 py-3 flex items-center gap-3 hover:bg-slate-100 hover:text-green-700 transition-all active:scale-[0.98]" href="treatmentsolutions.html"><span class="material-symbols-outlined">medication</span><span>Treatments</span></a>
            <a class="text-slate-600 rounded-xl px-4 py-3 flex items-center gap-3 hover:bg-slate-100 hover:text-green-700 transition-all active:scale-[0.98]" href="ordertracking.html"><span class="material-symbols-outlined">shopping_basket</span><span>Orders</span></a>
            <a class="text-slate-600 rounded-xl px-4 py-3 flex items-center gap-3 hover:bg-slate-100 hover:text-green-700 transition-all active:scale-[0.98]" href="expertschat.html"><span class="material-symbols-outlined">forum</span><span>Chat with Expert</span></a>
            <a class="bg-green-700 text-white rounded-xl px-4 py-3 flex items-center gap-3 active:scale-[0.98] transition-transform" href="#"><span class="material-symbols-outlined fill">notifications</span><span>Notifications</span></a>
        </div>
        <div class="mt-auto pt-4 border-t border-slate-200 px-4 pb-5">
            <a class="text-slate-600 rounded-xl px-4 py-3 flex items-center gap-3 hover:bg-slate-100 hover:text-green-700 transition-all" href="farmerprofile.html">
                <img src="" class="w-8 h-8 rounded-full object-cover border border-outline-variant shrink-0" alt="Profile" data-user-avatar />
                <div class="flex flex-col"><span class="font-bold text-on-surface text-sm" data-user-name>Loading...</span><span class="text-xs text-on-surface-variant" data-user-role>Loading...</span></div>
                <button class="ml-auto text-on-surface-variant hover:text-error transition-colors"><span class="material-symbols-outlined text-lg">logout</span></button>
            </a>
        </div>
    </nav>

    <!-- Mobile Header -->
    <header class="md:hidden sticky top-0 z-40 flex h-16 w-full items-center justify-between px-4 bg-slate-50 border-b border-slate-200 shadow-sm">
        <span class="text-xl font-black text-green-700">PlantDoc</span>
        <div class="flex items-center gap-2">
            <button class="p-2 text-green-600 rounded-full"><span class="material-symbols-outlined fill">notifications</span></button>
            <img src="" class="w-8 h-8 rounded-full object-cover border-2 border-green-600" alt="Profile" />
        </div>
    </header>

    <main class="flex-1 md:ml-64 w-full">
        <div class="p-6 md:p-8 flex flex-col gap-6 mx-auto w-full">

            <!-- Page Heading -->
            <div class="flex items-center justify-between gap-4">
                <div>
                    <h1 class="text-2xl font-bold text-on-surface font-headline">Notifications</h1>
                </div>
                <button onclick="markAllRead()" class="flex items-center gap-1.5 text-sm font-medium text-primary hover:text-on-primary-fixed-variant bg-primary-fixed/30 hover:bg-primary-fixed/50 px-3 py-2 rounded-lg transition-all active:scale-[0.98]">
                    <span class="material-symbols-outlined text-[18px]">done_all</span> Mark all as read
                </button>
            </div>

<!-- Filter Tabs -->
            <div class="flex gap-2 pb-4 pt-1 border-t-2 border-primary rounded-xl">
                <button class="filter-tab active px-4 py-2 text-sm font-medium rounded-full bg-primary-container text-on-primary-container transition-all active:scale-[0.97]" data-filter-tab="all">All Alerts</button>
                <button class="filter-tab px-4 py-2 text-sm font-medium rounded-full text-on-surface-variant hover:bg-surface-variant/50 transition-all active:scale-[0.97]" data-filter-tab="unread">
                    Unread <span id="unread-count" data-unread-count class="ml-1 inline-flex items-center justify-center w-5 h-5 rounded-full bg-primary text-on-primary text-[10px] font-bold hidden">0</span>
                </button>
                <button class="filter-tab px-4 py-2 text-sm font-medium rounded-full text-on-surface-variant hover:bg-surface-variant/50 transition-all active:scale-[0.97]" data-filter-tab="expert">Expert Replies</button>
            </div>

    <script src="../api.js"></script>
    <script src="./farmernotifications.js"></script>
</body>
</html>
