<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Chat with Expert - PlantDoc</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = { darkMode: "class", theme: { extend: { colors: { "surface-container": "#eceeef", "surface-variant": "#e1e3e4", "on-background": "#191c1d", "background": "#f8fafb", "primary": "#006a39", "on-tertiary-fixed": "#40000f", "outline-variant": "#bdcabc", "on-error-container": "#93000a", "surface-container-low": "#f2f4f5", "secondary-container": "#c6e4f4", "on-error": "#ffffff", "on-primary-fixed": "#00210e", "surface-container-lowest": "#ffffff", "error": "#ba1a1a", "tertiary-fixed": "#ffdadb", "on-surface-variant": "#3e4a3f", "primary-fixed-dim": "#64dd91", "outline": "#6d7a6f", "inverse-on-surface": "#eff1f2", "secondary-fixed-dim": "#adcbda", "inverse-surface": "#2e3132", "surface-tint": "#006d3a", "tertiary": "#a23546", "on-secondary": "#ffffff", "surface": "#f8fafb", "secondary": "#466270", "primary-fixed": "#82faab", "tertiary-container": "#c24d5e", "surface-dim": "#d8dadb", "surface-container-highest": "#e1e3e4", "on-tertiary-fixed-variant": "#851f33", "on-secondary-container": "#4a6774", "surface-bright": "#f8fafb", "on-secondary-fixed": "#001f2a", "surface-container-high": "#e6e8e9", "error-container": "#ffdad6", "on-primary": "#ffffff", "tertiary-fixed-dim": "#ffb2b8", "on-primary-fixed-variant": "#00522b", "on-surface": "#191c1d", "secondary-fixed": "#c9e7f7", "on-secondary-fixed-variant": "#2e4b57", "on-primary-container": "#f6fff4", "primary-container": "#008649", "on-tertiary-container": "#fffbff", "on-tertiary": "#ffffff", "inverse-primary": "#64dd91" }, borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" }, fontFamily: { "headline": ["Inter"], "body": ["Inter"], "label": ["Inter"] } } } }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background-color: #d8dadb;
            border-radius: 20px;
        }
    </style>
</head>

<body class="bg-background text-on-background h-screen flex font-body overflow-hidden">

    <!-- SideNavBar -->
    <nav
        class="bg-slate-50 text-sm font-medium fixed h-screen w-64 left-0 top-0 border-r border-slate-200 flex-col gap-2 hidden md:flex z-50">
        <div class="px-6 pt-6 pb-1"><span class="text-2xl font-black text-green-700">PlantDoc</span></div>
        <p class="text-xs text-slate-500 px-6 mb-4">Modern Farmer Portal</p>
        <div class="flex-1 flex flex-col gap-1 px-4">
            <a class="text-slate-600 rounded-xl px-4 py-3 flex items-center gap-3 hover:bg-slate-100 hover:text-green-700 transition-all active:scale-[0.98]"
                href="farmerdashboard.html"><span class="material-symbols-outlined">dashboard</span><span>Dashboard</span></a>
            <a class="text-slate-600 rounded-xl px-4 py-3 flex items-center gap-3 hover:bg-slate-100 hover:text-green-700 transition-all active:scale-[0.98]"
                href="recendiagnoses.html"><span class="material-symbols-outlined">biotech</span><span>Diagnoses</span></a>
            <a class="text-slate-600 rounded-xl px-4 py-3 flex items-center gap-3 hover:bg-slate-100 hover:text-green-700 transition-all active:scale-[0.98]"
                href="treatmentsolutions.html"><span class="material-symbols-outlined">medication</span><span>Treatments</span></a>
            <a class="text-slate-600 rounded-xl px-4 py-3 flex items-center gap-3 hover:bg-slate-100 hover:text-green-700 transition-all active:scale-[0.98]"
                href="ordertracking.html"><span class="material-symbols-outlined">shopping_basket</span><span>Orders</span></a>
            <a class="bg-green-700 text-white rounded-xl px-4 py-3 flex items-center gap-3 active:scale-[0.98] transition-transform"
                href="#"><span class="material-symbols-outlined fill">forum</span><span>Chat with Expert</span></a>
            <a class="text-slate-600 rounded-xl px-4 py-3 flex items-center gap-3 hover:bg-slate-100 hover:text-green-700 transition-all active:scale-[0.98]"
                href="farmernotifications.html"><span class="material-symbols-outlined">notifications</span><span>Notifications</span></a>
        </div>
        <div class="mt-auto pt-4 border-t border-slate-200 px-4 pb-5">
            <a class="text-slate-600 rounded-xl px-4 py-3 flex items-center gap-3 hover:bg-slate-100 hover:text-green-700 transition-all"
                href="farmerprofile.html">
                <img src="" class="w-8 h-8 rounded-full object-cover border border-outline-variant shrink-0" alt="Profile" data-user-avatar />
                <div class="flex flex-col"><span class="font-bold text-on-surface text-sm" data-user-name>Loading...</span><span class="text-xs text-on-surface-variant" data-user-role>Loading...</span></div>
                <button class="ml-auto text-on-surface-variant hover:text-error transition-colors"><span class="material-symbols-outlined text-lg">logout</span></button>
            </a>
        </div>
    </nav>

    <!-- Chat Layout -->
    <div class="flex-1 md:ml-64 flex h-screen overflow-hidden">

        <!-- Conversations Panel -->
        <aside
            class="w-80 shrink-0 border-r border-surface-variant flex flex-col bg-surface-container-lowest hidden md:flex">
            <div class="p-5 border-b border-surface-variant">
                <h2 class="text-lg font-bold text-on-surface font-headline mb-4">Messages</h2>
                <div class="relative">
                    <span
                        class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant">search</span>
                    <input
                        class="w-full pl-10 pr-4 py-2 bg-surface-container-low border border-primary/70 rounded-xl focus:ring-1 focus:ring-primary text-sm text-on-surface placeholder:text-on-surface-variant"
                        placeholder="Search farmers, crops..." type="text" />
                </div>
            </div>
            <div class="flex-1 overflow-y-auto" data-chat-list></div>
        </aside>

        <!-- Chat Window -->
        <section class="flex-1 flex flex-col min-w-0 bg-surface-container-lowest">

            <!-- Chat Header -->
            <header
                class="h-[72px] px-6 flex items-center justify-between border-b border-surface-variant bg-surface-bright shrink-0">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-full bg-primary-container flex items-center justify-center shrink-0">
                        <span class="material-symbols-outlined text-on-primary-container">support_agent</span>
                    </div>
                    <div>
                        <h2 class="font-bold text-on-surface text-sm" data-chat-header-name>Expert Chat</h2>
                        <p class="text-xs text-on-surface-variant" data-chat-header-sub>Active Case</p>
                    </div>
                </div>
                <div class="flex items-center gap-1 text-on-surface-variant">
                    <button class="p-2 hover:bg-surface-container rounded-full transition-colors active:scale-95"><span
                            class="material-symbols-outlined">call</span></button>
                    <button class="p-2 hover:bg-surface-container rounded-full transition-colors active:scale-95"><span
                            class="material-symbols-outlined">videocam</span></button>
                    <button class="p-2 hover:bg-surface-container rounded-full transition-colors active:scale-95"><span
                            class="material-symbols-outlined">more_vert</span></button>
                </div>
            </header>

            <!-- Messages -->
            <div class="flex-1 overflow-y-auto p-6 space-y-6 bg-surface-container-lowest" data-messages-area>
                <div class="flex justify-center">
                    <span class="text-xs font-medium bg-surface-container px-3 py-1 rounded-full text-on-surface-variant">Loading...</span>
                </div>
            </div>

            <!-- Chat Input Area -->
                <div class="p-4 bg-surface-container-lowest border-t border-surface-variant">
                    <!-- Quick Replies -->
                    <div class="flex gap-2 mb-3 overflow-x-auto pb-1 no-scrollbar">
                        <button class="whitespace-nowrap px-3 py-1.5 rounded-full border border-primary text-on-surface-variant text-xs hover:bg-surface-container transition-colors active:scale-[0.98]">
                            Please upload a clearer image
                        </button>
                        <button class="whitespace-nowrap px-3 py-1.5 rounded-full border border-primary text-on-surface-variant text-xs hover:bg-surface-container transition-colors active:scale-[0.98]">
                            Apply recommended treatment
                        </button>
                        <button class="whitespace-nowrap px-3 py-1.5 rounded-full border border-primary text-on-surface-variant text-xs hover:bg-surface-container transition-colors active:scale-[0.98]">
                            Your case is under review
                        </button>
                    </div>
                    <!-- Input Field -->
                    <div class="flex items-center gap-2 bg-surface-container rounded-3xl px-2 focus-within:ring-2 focus-within:ring-primary/50 transition-shadow">
                        <button class="p-2 mt-1 text-on-surface-variant hover:text-primary transition-colors rounded-lg hover:bg-surface-variant active:scale-[0.98]">
                            <span class="material-symbols-outlined">attach_file</span>
                        </button>
                        <button class="p-2 mt-1 text-on-surface-variant hover:text-primary transition-colors rounded-lg hover:bg-surface-variant active:scale-[0.98]">
                            <span class="material-symbols-outlined">image</span>
                        </button>
                        <input class="flex-1 bg-transparent border-none rounded-xl focus:ring-0 text-sm text-on-surface px-1 py-1" placeholder="Type your message..." type="text" id="message-input"/>
                        <button class="p-2 bg-white border border-primary text-primary rounded-full hover:bg-primary hover:text-white transition-colors flex items-center justify-center shadow-sm active:scale-[0.98]" id="send-btn">
                            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">send</span>
                        </button>
                    </div>
                </div>

        </section>
    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="../api.js"></script>
    <script src="./expertschat.js"></script>
</body>

</html>
