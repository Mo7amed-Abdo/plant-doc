<!DOCTYPE html>
<html class="h-full" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>PlantDoc - Expert Chat</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container": "#eceeef",
                        "surface-variant": "#e1e3e4",
                        "on-background": "#191c1d",
                        "background": "#f8fafb",
                        "primary": "#006a39",
                        "on-tertiary-fixed": "#40000f",
                        "outline-variant": "#bdcabc",
                        "on-error-container": "#93000a",
                        "surface-container-low": "#f2f4f5",
                        "secondary-container": "#c6e4f4",
                        "on-error": "#ffffff",
                        "on-primary-fixed": "#00210e",
                        "surface-container-lowest": "#ffffff",
                        "error": "#ba1a1a",
                        "tertiary-fixed": "#ffdadb",
                        "on-surface-variant": "#3e4a3f",
                        "primary-fixed-dim": "#64dd91",
                        "outline": "#6d7a6f",
                        "inverse-on-surface": "#eff1f2",
                        "secondary-fixed-dim": "#adcbda",
                        "inverse-surface": "#2e3132",
                        "surface-tint": "#006d3a",
                        "tertiary": "#a23546",
                        "on-secondary": "#ffffff",
                        "surface": "#f8fafb",
                        "secondary": "#466270",
                        "primary-fixed": "#82faab",
                        "tertiary-container": "#c24d5e",
                        "surface-dim": "#d8dadb",
                        "surface-container-highest": "#e1e3e4",
                        "on-tertiary-fixed-variant": "#851f33",
                        "on-secondary-container": "#4a6774",
                        "surface-bright": "#f8fafb",
                        "on-secondary-fixed": "#001f2a",
                        "surface-container-high": "#e6e8e9",
                        "error-container": "#ffdad6",
                        "on-primary": "#ffffff",
                        "tertiary-fixed-dim": "#ffb2b8",
                        "on-primary-fixed-variant": "#00522b",
                        "on-surface": "#191c1d",
                        "secondary-fixed": "#c9e7f7",
                        "on-secondary-fixed-variant": "#2e4b57",
                        "on-primary-container": "#f6fff4",
                        "primary-container": "#008649",
                        "on-tertiary-container": "#fffbff",
                        "on-tertiary": "#ffffff",
                        "inverse-primary": "#64dd91"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {},
                    "fontFamily": {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="bg-background text-on-background h-full flex overflow-hidden font-body">

    <!-- SideNavBar â€” matches dashboard & pending cases exactly, Chat is active -->
    <nav
        class="bg-slate-50 dark:bg-slate-950 text-green-600 dark:text-green-400 font-inter text-sm font-medium fixed h-screen w-64 left-0 top-0 border-r border-slate-200 dark:border-slate-800 flex flex-col gap-2 h-full hidden md:flex z-50">
        <div class="flex items-center gap-1">
            <div class="flex items-center">
                <img src="logo dark.png" alt="" class="w-26 h-28">
            </div>
            <span class="text-lg font-bold text-green-700 dark:text-green-500">PlantDoc</span>
        </div>
        <div class="flex-1 flex flex-col gap-2 px-4">
            <!-- Dashboard (inactive) -->
            <a class="text-slate-600 dark:text-slate-400 hover:bg-slate-200/50 dark:hover:bg-slate-800/50 rounded-lg p-3 flex items-center gap-3 hover:bg-slate-200 dark:hover:bg-slate-800 transition-all scale-100 active:scale-[0.98] transition-transform"
                href="expertDashboard.html">
                <span class="material-symbols-outlined">dashboard</span>
                <span>Dashboard</span>
            </a>
            <!-- Pending Cases (inactive) -->
            <a class="text-slate-600 dark:text-slate-400 hover:bg-slate-200/50 dark:hover:bg-slate-800/50 rounded-lg p-3 flex items-center justify-between hover:bg-slate-200 dark:hover:bg-slate-800 transition-all scale-100 active:scale-[0.98] transition-transform"
                href="expertPendingcases.html">
                <div class="flex items-center gap-3">
                    <span class="material-symbols-outlined">pending_actions</span>
                    <span>Pending Cases</span>
                </div>
            </a>
            <!-- Chat (ACTIVE) with badge -->
            <a class="bg-green-700 dark:bg-green-900/30 text-white dark:text-green-300 rounded-lg p-3 flex rounded-xl items-center gap-3 scale-100 active:scale-[0.98] transition-transform justify-between w-full"
                href="#">
                <div class="flex items-center gap-3">
                    <span class="material-symbols-outlined"
                        style="font-variation-settings: 'FILL' 1;">chat_bubble</span>
                    <span>Chat</span>
                </div>
                <span data-chat-badge
                    class="bg-white text-primary text-xs rounded-full h-5 min-w-[20px] px-1 flex items-center justify-center font-bold hidden">0</span>
            </a>
            <!-- Profile (inactive) -->
            <a class="text-slate-600 dark:text-slate-400 hover:bg-slate-200/50 dark:hover:bg-slate-800/50 rounded-lg p-3 flex items-center gap-3 hover:bg-slate-200 dark:hover:bg-slate-800 transition-all scale-100 active:scale-[0.98] transition-transform"
                href="expertProfile.html">
                <span class="material-symbols-outlined">account_circle</span>
                <span>Profile</span>
            </a>
        </div>
        <!-- Bottom profile section -->
        <div class="mt-auto pt-4 mb-4 border-t border-slate-200 dark:border-slate-800 px-4">
            <div class="flex items-center gap-3 px-2">
                <img src="" alt="Profile" class="w-10 h-10 rounded-full object-cover border border-outline-variant"
                    data-user-avatar />
                <div class="flex flex-col">
                    <span class="font-bold text-on-surface text-sm" data-user-name>Loading...</span>
                    <span class="text-xs text-on-surface-variant" data-user-role>Loading...</span>
                </div>
                <button class="ml-auto text-on-surface-variant hover:text-error transition-colors">
                    <span class="material-symbols-outlined text-lg">logout</span>
                </button>
            </div>
        </div>
        </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col h-full overflow-hidden md:ml-64">

        <!-- TopAppBar (Mobile Only) -->
        <header
            class="md:hidden sticky top-0 z-40 flex h-16 w-full items-center justify-between px-4 bg-gray-50 border-b border-slate-200 shadow-sm">
            <div class="flex items-center gap-2">
                <img src="logo dark.png" alt="" class="h-8">
                <h1 class="text-xl font-bold text-green-700">PlantDoc</h1>
            </div>
            <div class="flex items-center gap-2">
                <button
                    class="p-2 text-slate-500 hover:text-green-600 transition-colors active:scale-95 rounded-full hover:bg-surface-container-highest">
                    <span class="material-symbols-outlined">notifications</span>
                </button>
                <button
                    class="p-2 text-slate-500 hover:text-green-600 transition-colors active:scale-95 rounded-full hover:bg-surface-container-highest">
                    <span class="material-symbols-outlined">account_circle</span>
                </button>
            </div>
        </header>

        <!-- Chat Layout -->
        <div class="flex-1 flex overflow-hidden">

            <!-- Left Panel: Chat List -->
            <aside
                class="w-full md:w-[320px] lg:w-[360px] bg-surface-container-lowest border-r border-surface-variant flex flex-col flex-shrink-0">
                <!-- List Header -->
                <div class="p-4 bg-gray-50 rounded-t-2xl">
                    <h2 class="text-xl font-bold text-on-surface mb-4">Conversations</h2>
                    <div class="flex gap-2">
                        <button data-chat-filter="all"
                            class="px-3 py-1.5 rounded-full bg-green-700 text-white text-xs font-semibold active:scale-[0.98] transition-transform">All</button>
                        <button data-chat-filter="unread"
                            class="px-3 py-1.5 rounded-full bg-surface-container text-on-surface-variant text-xs font-medium hover:bg-surface-variant transition-colors active:scale-[0.98]">Unread</button>
                    </div>
                </div>

                <!-- Chat Items -->
                <div class="flex-1 overflow-y-auto" data-chat-list>
    <div class="p-4 space-y-4 animate-pulse">
        <div class="flex items-start gap-3">
            <div class="w-11 h-11 rounded-full bg-surface-variant"></div>
            <div class="flex-1 min-w-0 space-y-2">
                <div class="flex justify-between gap-3">
                    <div class="h-4 w-28 rounded bg-surface-variant"></div>
                    <div class="h-3 w-12 rounded bg-surface-variant"></div>
                </div>
                <div class="h-3 w-24 rounded bg-surface-variant"></div>
                <div class="h-3 w-36 rounded bg-surface-variant"></div>
            </div>
        </div>
        <div class="flex items-start gap-3">
            <div class="w-11 h-11 rounded-full bg-surface-variant"></div>
            <div class="flex-1 min-w-0 space-y-2">
                <div class="flex justify-between gap-3">
                    <div class="h-4 w-24 rounded bg-surface-variant"></div>
                    <div class="h-3 w-14 rounded bg-surface-variant"></div>
                </div>
                <div class="h-3 w-20 rounded bg-surface-variant"></div>
                <div class="h-3 w-32 rounded bg-surface-variant"></div>
            </div>
        </div>
        <div class="flex items-start gap-3">
            <div class="w-11 h-11 rounded-full bg-surface-variant"></div>
            <div class="flex-1 min-w-0 space-y-2">
                <div class="flex justify-between gap-3">
                    <div class="h-4 w-32 rounded bg-surface-variant"></div>
                    <div class="h-3 w-10 rounded bg-surface-variant"></div>
                </div>
                <div class="h-3 w-16 rounded bg-surface-variant"></div>
                <div class="h-3 w-40 rounded bg-surface-variant"></div>
            </div>
        </div>
    </div>
</div>
</aside>

            <!-- Right Panel: Chat Area -->
            <section class="flex-1 flex flex-col bg-surface-container-lowest relative hidden md:flex">

                <!-- Chat Header -->
                <div
                    class="px-6 py-4 border-b border-surface-variant flex justify-between items-center bg-gray-50 z-10 shadow-sm">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-full bg-surface-variant animate-pulse shrink-0" data-chat-header-avatar-shell></div>
                        <img alt="Avatar" class="w-10 h-10 rounded-full object-cover hidden"
                            src=""
                            data-chat-header-avatar />
                        <div>
                            <h2 class="text-lg font-bold text-on-surface flex items-center gap-2" data-chat-header-name>
                                <span data-chat-header-name-text class="inline-block h-5 w-28 rounded bg-surface-variant animate-pulse text-transparent">Loading</span>
                                <span data-chat-header-badge
                                    class="hidden px-2 py-0.5 rounded text-xs font-semibold bg-error-container text-on-error-container"></span>
                            </h2>
                            <p class="text-sm text-on-surface-variant flex items-center gap-1" data-chat-header-sub>
                                <span class="material-symbols-outlined text-[16px]">local_florist</span>
                                <span data-chat-header-sub-text class="inline-block h-4 w-24 rounded bg-surface-variant animate-pulse text-transparent">Loading</span>
                            </p>
                        </div>
                    </div>
                    <div class="flex gap-3">
                        <button data-resolve-btn
                            class="px-4 py-2 bg-green-700 text-white text-sm font-semibold rounded-lg hover:bg-primary/90 transition-colors flex items-center gap-2 shadow-sm active:scale-[0.98]">
                            <span class="material-symbols-outlined text-lg">check_circle</span> Resolve
                        </button>
                    </div>
                </div>

                <!-- Chat Messages Area -->
                <div class="flex-1 overflow-y-auto p-6 flex flex-col gap-6 bg-surface" data-messages-area>
    <div class="animate-pulse space-y-5">
        <div class="flex justify-center">
            <div class="h-6 w-44 rounded-full bg-surface-container-high"></div>
        </div>
        <div class="flex items-end gap-3 max-w-[80%]">
            <div class="w-8 h-8 rounded-full bg-surface-variant flex-shrink-0"></div>
            <div class="flex flex-col gap-2 w-full max-w-md">
                <div class="h-3 w-24 rounded bg-surface-variant"></div>
                <div class="h-16 rounded-2xl rounded-bl-sm bg-surface-container-high"></div>
            </div>
        </div>
        <div class="flex items-end gap-3 max-w-[80%] ml-auto justify-end">
            <div class="flex flex-col gap-2 items-end w-full max-w-md">
                <div class="h-3 w-20 rounded bg-surface-variant"></div>
                <div class="h-14 w-full rounded-2xl rounded-br-sm bg-green-200/70"></div>
            </div>
        </div>
        <div class="flex items-end gap-3 max-w-[80%]">
            <div class="w-8 h-8 rounded-full bg-surface-variant flex-shrink-0"></div>
            <div class="flex flex-col gap-2 w-full max-w-md">
                <div class="h-40 rounded-2xl rounded-bl-sm bg-surface-container-high"></div>
            </div>
        </div>
    </div>
</div>

<!-- Chat Input Area -->
                <div class="p-4 bg-surface-container-lowest border-t border-surface-variant">
                    <!-- Quick Replies -->
                    <div class="flex gap-2 mb-3 overflow-x-auto pb-1 no-scrollbar">
                        <button
                            class="whitespace-nowrap px-3 py-1.5 rounded-full border border-primary text-on-surface-variant text-xs hover:bg-surface-container transition-colors active:scale-[0.98]">
                            Please upload a clearer image
                        </button>
                        <button
                            class="whitespace-nowrap px-3 py-1.5 rounded-full border border-primary text-on-surface-variant text-xs hover:bg-surface-container transition-colors active:scale-[0.98]">
                            Apply recommended treatment
                        </button>
                        <button
                            class="whitespace-nowrap px-3 py-1.5 rounded-full border border-primary text-on-surface-variant text-xs hover:bg-surface-container transition-colors active:scale-[0.98]">
                            Your case is under review
                        </button>
                    </div>
                    <!-- Input Field -->
                    <div
                        class="flex items-center gap-2 bg-surface-container rounded-3xl px-2 focus-within:ring-2 focus-within:ring-primary/50 transition-shadow">
                        <button
                            class="p-2 mt-1 text-on-surface-variant hover:text-primary transition-colors rounded-lg hover:bg-surface-variant active:scale-[0.98]">
                            <span class="material-symbols-outlined">attach_file</span>
                        </button>
                        <button
                            class="p-2 mt-1 text-on-surface-variant hover:text-primary transition-colors rounded-lg hover:bg-surface-variant active:scale-[0.98]">
                            <span class="material-symbols-outlined">image</span>
                        </button>
                        <input id="message-input"
                            class="flex-1 bg-transparent border-none rounded-xl focus:ring-0 text-sm text-on-surface px-1 py-1"
                            placeholder="Type your message..." type="text" />
                        <button id="send-btn"
                            class="p-2 bg-white border border-primary text-primary rounded-full hover:bg-primary hover:text-white transition-colors flex items-center justify-center shadow-sm active:scale-[0.98]">
                            <span class="material-symbols-outlined"
                                style="font-variation-settings: 'FILL' 1;">send</span>
                        </button>
                    </div>
                </div>

            </section>

            <!-- Optional Right Side Panel (Case Preview) -->
            <aside
                class="w-[300px] border-l border-surface-variant bg-surface-container-lowest flex-col hidden xl:flex">
                <div
                    class="p-[8.7%] border-b border-surface-variant flex text-lg justify-between items-center bg-gray-50">
                    <h3 class="font-bold text-on-surface">Case Details</h3>
                </div>
                <div class="p-4 flex-1 overflow-y-auto" data-case-details>
                    <div class="text-sm text-on-surface-variant text-center py-10">Select a chat to load case details.
                    </div>
                </div>
            </aside>

        </div>
    </main>


    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="../api.js"></script>
    <script src="./expertSidebarBadges.js"></script>
    <script src="./expertchat.js"></script>
</body>

</html>
